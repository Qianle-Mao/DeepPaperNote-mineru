interface:
  display_name: "DeepPaperNote-mineru"
  short_description: "MinerU-backed DeepPaperNote fork for one-paper deep-reading notes with OCR parsing, grounding, figure decisions, lint, and Obsidian save."
  default_prompt: "Use $deeppapernote-mineru when the user wants to turn a single paper into a high-quality Markdown deep-reading note using the MinerU-backed DeepPaperNote workflow. Use MinerU v4 precise API with OCR as the default parsing backend via MINERU_API_TOKEN or DEEPPAPERNOTE_MINERU_API_TOKEN; do not hard-code tokens. Resolve the paper, extract MinerU-backed canonical raw source text and a source manifest, plan figure and table decisions, ground the note plan against source sections/pages, write the final Chinese note in the data-mining/AI 精读版 format from references/data-mining-ai-note-format.md, run lint plus final quality/readability reviews, and save it into the configured Obsidian-style vault or the approved fallback."

policy:
  allow_implicit_invocation: true
